<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Setup — EduGenius AI</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;

      /* Same futuristic background */
      background:
        radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.25), transparent 40%),
        linear-gradient(135deg, #0f2027, #203a43, #2c5364);

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .profile-container {
      width: 90%;
      max-width: 380px;
      padding: 25px;

      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);

      color: white;
      text-align: left;
    }

    .logo {
      display: block;
      margin: 0 auto 10px;
      width: 70px;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    label {
      font-size: 14px;
      color: #ccc;
    }

    /* Inputs */
    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 14px;
    }

    input::placeholder {
      color: #bbb;
    }

    select option {
      color: black;
    }

    /* Button */
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #00f2ff, #8a2be2);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00f2ff;
    }
  </style>
</head>

<body>

  <div class="profile-container">

    <img src="logo.png" alt="EduGenius AI Logo" class="logo">
    <h2>Complete Your Profile</h2>

    <!-- Profile Picture -->
    <label>Upload Profile Picture</label>
    <input type="file" id="photo" accept="image/*">

    <!-- Name -->
    <label>Name:</label>
    <input type="text" id="name" placeholder="Enter your name">

    <!-- Class -->
    <label>Class:</label>
    <select id="class">
      <option>Select Class</option>
      <option>Class 5</option>
      <option>Class 6</option>
      <option>Class 7</option>
      <option>Class 8</option>
      <option>Class 9</option>
      <option>Class 10</option>
      </select>

    <!-- Board -->
    <label>Board:</label>
    <select id="board">
      <option>Select Board</option>
      <option>CBSE</option>
      <option>ICSE</option>
      <option>State Board</option>
      <option>Other</option>
    </select>

    <!-- School -->
    <label>School (optional):</label>
    <input type="text" id="school" placeholder="School name">

    <!-- Goal -->
    <label>Goal (optional):</label>
    <select id="goal">
      <option>Select Goal</option>
      <option>Score High Marks</option>
      <option>JEE Preparation</option>
      <option>NEET Preparation</option>
      <option>Olympiad</option>
      <option>Improve Basics</option>
      <option>Other</option>
    </select>

    <!-- Continue Button -->
    <button onclick="goHome()">Continue</button>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBCX7uxYy_3XdjZhUpsh5qZ5fTy-Ai3YqQ",
      authDomain: "edugenius-ai69.firebaseapp.com",
      projectId: "edugenius-ai69",
      appId: "1:108519318021:web:f05342a38336895945f26c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function goHome() {

      const user = auth.currentUser;

      if (!user) {
        alert("Please login again");
        window.location.href = "login.html";
        return;
      }

      const name = document.getElementById("name").value.trim();
      const studentClass = document.getElementById("class").value;
      const board = document.getElementById("board").value;
      const file = document.getElementById("photo").files[0];

      if (!name || studentClass === "Select Class") {
        alert("Please fill required fields");
        return;
      }

      const reader = new FileReader();

      reader.onload = function () {

        const imageUrl = reader.result;

        db.collection("users").doc(user.uid).set({
          name: name,
          class: studentClass,
          board: board,
          xp: 0,
          photo: imageUrl
        })
        .then(() => {
          alert("Profile saved ✅");
          window.location.href = "home.html";
        })
        .catch(error => {
          alert("Error saving profile: " + error.message);
        });

      };

      if (file) {
        reader.readAsDataURL(file);
      } else {
        db.collection("users").doc(user.uid).set({
          name: name,
          class: studentClass,
          board: board,
          xp: 0,
          photo: ""
        })
        .then(() => {
          alert("Profile saved ✅");
          window.location.href = "home.html";
        });
      }
    }
  </script>

</body>
</html>
