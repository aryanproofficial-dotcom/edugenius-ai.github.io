<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – EduGenius AI</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;

      /* Same futuristic background */
      background:
        radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.25), transparent 40%),
        linear-gradient(135deg, #0f2027, #203a43, #2c5364);

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 350px;
      text-align: center;
      color: white;
    }

    .card {
      padding: 25px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
    }

    .logo {
      width: 70px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 10px 0 5px;
    }

    .subtitle {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 15px;
    }

    /* Inputs */
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 14px;
    }

    input::placeholder {
      color: #bbb;
    }

    /* Button */
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #00f2ff, #8a2be2);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00f2ff;
    }

    .small-text {
      margin-top: 12px;
      font-size: 14px;
    }

    .small-text a {
      color: #00f2ff;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="container">  
    <div class="card">  

      <!-- Logo -->
      <img src="logo.png" alt="EduGenius AI Logo" class="logo">

      <h2>Create New Account</h2>
      <p class="subtitle">Join EduGenius AI</p>  

      <!-- Inputs -->  
      <input type="email" id="email" placeholder="Email" required>  
      <input type="password" id="password" placeholder="Password" required>  

      <!-- Button -->  
      <button type="button" onclick="signup()">Create Account</button>  

      <!-- Bottom link -->  
      <p class="small-text">  
        Already have an account?  
        <a href="index.html">Login</a>  
      </p>  

    </div>  

    <footer>© 2026 EduGenius AI</footer>

  </div>  

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {  
      apiKey: "AIzaSyBCX7uxYy_3XdjZhUpsh5qZ5fTy-Ai3YqQ",  
      authDomain: "edugenius-ai69.firebaseapp.com",  
      projectId: "edugenius-ai69",  
      appId: "1:108519318021:web:f05342a38336895945f26c"  
    };  
  
    firebase.initializeApp(firebaseConfig);  
    const auth = firebase.auth();  
  
    function signup() {  
      const email = document.getElementById("email").value.trim();  
      const password = document.getElementById("password").value.trim();  
  
      if (!email || !password) {  
        alert("Please fill all fields");  
        return;  
      }  
  
      auth.createUserWithEmailAndPassword(email, password)  
        .then(() => {  
          alert("Account created successfully 🎉");  
          window.location.href = "profile.html";  
        })  
        .catch((error) => {  
          alert(error.message);  
        });  
    }  
  </script>

</body>
</html>
