<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGenius Calculator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1e1e2f;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 340px;
  background: white;
  padding: 15px;
  border-radius: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
  color: #6a1b9a;
}

#display {
  width: 100%;
  padding: 12px;
  font-size: 22px;
  text-align: right;
  margin-bottom: 10px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #6a1b9a;
  color: white;
  font-size: 16px;
}

button:active { transform: scale(0.95); }

.special { background: #ff9800; }

#history, #explain {
  margin-top: 10px;
  padding: 10px;
  background: #f1f1f1;
  border-radius: 10px;
  font-size: 13px;
  max-height: 120px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">

<h2>🧮 EduGenius Calculator</h2>

<input id="display" disabled>

<div class="buttons">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">−</button>

<button onclick="press('0')">0</button>
<button onclick="clearAll()">C</button>
<button onclick="calculate()">=</button>
<button onclick="press('+')">+</button>

<button onclick="explain()" class="special">Explain</button>
</div>

<div id="history"></div>
<div id="explain"></div>

</div>

<script>

let display = document.getElementById("display");
let history = document.getElementById("history");
let explainBox = document.getElementById("explain");

/* ================= INPUT ================= */
function press(val) {
  display.value += val;
}

/* ================= CLEAR ================= */
function clearAll() {
  display.value = "";
  explainBox.innerHTML = "";
}

/* ================= CALCULATE ================= */
function calculate() {
  try {
    let result = Function('"use strict";return (' + display.value + ')')();
    history.innerHTML += `<div>${display.value} = ${result}</div>`;
    display.value = result;
  } catch {
    alert("Invalid Expression");
  }
}

/* ================= TOKENIZER ================= */
function tokenize(exp) {
  return exp.match(/(\d+\.?\d*|[+\-*/])/g);
}

/* ================= FIXED BODMAS ENGINE ================= */
function solveBODMAS(tokens) {

  let log = [];

  function process(op) {
    while (tokens.includes(op)) {
      for (let i = 0; i < tokens.length; i++) {
        if (tokens[i] === op) {

          let a = parseFloat(tokens[i - 1]);
          let b = parseFloat(tokens[i + 1]);
          let res = 0;

          if (op === "/") res = a / b;
          if (op === "*") res = a * b;
          if (op === "+") res = a + b;
          if (op === "-") res = a - b;

          log.push(`${a} ${op} ${b} = ${res}`);

          tokens.splice(i - 1, 3, res.toString());
          break;
        }
      }
    }
  }

  // STRICT ORDER FIX
  log.push("Step 1: Division (÷)");
  process("/");

  log.push("Step 2: Multiplication (×)");
  process("*");

  log.push("Step 3: Addition (+)");
  process("+");

  log.push("Step 4: Subtraction (−)");
  process("-");

  return {
    result: tokens[0],
    log: log
  };
}

/* ================= EXPLAIN (FIXED) ================= */
function explain() {

  let exp = display.value;
  if (!exp) return;

  let tokens = tokenize(exp);
  let { result, log } = solveBODMAS(tokens);

  let output = "🤖 Step-by-step (Correct Order):<br><br>";

  log.forEach(step => {
    output += step + "<br>";
  });

  output += "<br><b>Final Answer = " + result + "</b>";

  explainBox.innerHTML = output;
}

/* ================= KEYBOARD ================= */
document.addEventListener("keydown", (e) => {
  if ("0123456789+-*/".includes(e.key)) press(e.key);
  else if (e.key === "Enter") calculate();
  else if (e.key === "Backspace") display.value = display.value.slice(0, -1);
  else if (e.key === "Escape") clearAll();
});

</script>

</body>
</html>
