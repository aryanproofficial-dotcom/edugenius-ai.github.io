<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator – EduGenius AI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a1b9a, #3f51b5);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .calc-container {
      width: 100%;
      max-width: 340px;
      background: #ffffff;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
      color: #6a1b9a;
    }

    #display {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #f3f3f3;
      text-align: right;
      overflow-x: auto;
      margin-bottom: 10px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .buttons button {
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background: #6a1b9a;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .buttons button:hover {
      background: #4a148c;
      transform: scale(1.05);
    }

    .special {
      background: #ff9800 !important;
    }

    .ai-btn {
      background: #00bcd4 !important;
      grid-column: span 2;
    }

    #history {
      margin-top: 15px;
      max-height: 150px;
      overflow-y: auto;
      background: #f3e5f5;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      text-align: left;
    }

    #history p {
      margin: 5px 0;
      cursor: pointer;
    }

    #history p:hover {
      background: #e1bee7;
      border-radius: 5px;
      padding: 3px;
    }
  </style>
</head>

<body>

  <div class="calc-container">
    <h2>🧮 EduGenius Calculator</h2>

    <input type="text" id="display" disabled>

    <div class="buttons">

      <!-- Scientific -->
      <button onclick="square()">x²</button>
      <button onclick="sqrt()">√</button>
      <button onclick="percent()">%</button>
      <button onclick="backspace()">⌫</button>

      <!-- Numbers -->
      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      <button onclick="press('/')" class="special">÷</button>

      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      <button onclick="press('*')" class="special">×</button>

      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      <button onclick="press('-')" class="special">−</button>

      <button onclick="press('0')">0</button>
      <button onclick="clearDisplay()">C</button>
      <button onclick="calculate()" class="special">=</button>
      <button onclick="press('+')" class="special">+</button>

      <!-- AI + Clear -->
      <button onclick="explain()" class="ai-btn">🤖 Explain</button>
      <button onclick="clearHistory()">🧹</button>

    </div>

    <div id="history"></div>
  </div>

  <script>
    const display = document.getElementById("display");
    const historyBox = document.getElementById("history");

    function press(val) {
      display.value += val;
    }

    function calculate() {
      try {
        let exp = display.value;
        let result = Function('"use strict";return (' + exp + ')')();

        let finalResult = Number(result.toFixed(6));
        display.value = finalResult;

        let item = document.createElement("p");
        item.innerText = `${exp} = ${finalResult}`;

        item.onclick = () => {
          display.value = exp;
        };

        historyBox.appendChild(item);

        if (historyBox.children.length > 10) {
          historyBox.removeChild(historyBox.firstChild);
        }

        historyBox.scrollTop = historyBox.scrollHeight;

      } catch {
        alert("Invalid calculation");
      }
    }

    function clearDisplay() {
      display.value = "";
    }

    function backspace() {
      display.value = display.value.slice(0, -1);
    }

    function clearHistory() {
      historyBox.innerHTML = "";
    }

    function square() {
      if (display.value) {
        let v = Number(display.value);
        display.value = v * v;
      }
    }

    function sqrt() {
      if (display.value) {
        let v = Number(display.value);
        display.value = Math.sqrt(v);
      }
    }

    function percent() {
      if (display.value) {
        let v = Number(display.value);
        display.value = v / 100;
      }
    }

    // 🔥 BEST EXPLAIN FEATURE
    function explain() {
      let exp = display.value;

      if (!exp) {
        alert("Enter something first");
        return;
      }

      let steps = "🤖 Step-by-step Explanation:\n\n";

      try {
        if (exp.includes("+")) {
          let parts = exp.split("+");
          let result = parts.reduce((a, b) => Number(a) + Number(b));

          steps += "➤ Addition\n";
          steps += `➤ ${parts.join(" + ")}\n`;
          steps += `➤ Result = ${result}`;

        } else if (exp.includes("-")) {
          let parts = exp.split("-");
          let result = parts.reduce((a, b) => Number(a) - Number(b));

          steps += "➤ Subtraction\n";
          steps += `➤ ${parts.join(" - ")}\n`;
          steps += `➤ Result = ${result}`;

        } else if (exp.includes("*")) {
          let parts = exp.split("*");
          let result = parts.reduce((a, b) => Number(a) * Number(b));

          steps += "➤ Multiplication\n";
          steps += `➤ ${parts.join(" × ")}\n`;
          steps += `➤ Result = ${result}`;

        } else if (exp.includes("/")) {
          let parts = exp.split("/");
          let result = parts.reduce((a, b) => Number(a) / Number(b));

          steps += "➤ Division\n";
          steps += `➤ ${parts.join(" ÷ ")}\n`;
          steps += `➤ Result = ${result}`;

        } else {
          steps += "➤ Basic calculation\n";
        }

        let final = Function('"use strict";return (' + exp + ')')();
        steps += `\n\n✅ Final Answer = ${final}`;

        alert(steps);

      } catch {
        alert("Cannot explain this");
      }
    }

    // Keyboard support
    document.addEventListener("keydown", function(e) {
      const key = e.key;

      if ("0123456789+-*/.".includes(key)) {
        press(key);
      } else if (key === "Enter") {
        calculate();
      } else if (key === "Backspace") {
        backspace();
      } else if (key === "Escape") {
        clearDisplay();
      }
    });
  </script>

</body>
</html>
