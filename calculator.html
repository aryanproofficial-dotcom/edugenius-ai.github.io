<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGenius Pro | The Ultimate Educator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.all.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: rgba(255,255,255,0.05); --accent: #00d4ff; --text: #ffffff; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; color: var(--text); overflow: hidden; }
        
        /* Layout */
        .app-container { display: flex; width: 100%; max-width: 1200px; margin: auto; height: 90vh; gap: 20px; padding: 20px; }
        .calc-side { flex: 1; background: var(--panel); backdrop-filter: blur(20px); border-radius: 30px; padding: 25px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); }
        .graph-side { flex: 1.5; background: var(--panel); border-radius: 30px; padding: 20px; display: flex; flex-direction: column; }

        /* Display */
        #display { width: 100%; background: transparent; border: none; color: var(--accent); font-size: 32px; text-align: right; outline: none; margin-bottom: 5px; }
        #preview { height: 25px; text-align: right; color: rgba(255,255,255,0.5); font-size: 18px; margin-bottom: 20px; }

        /* Buttons */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex-grow: 1; }
        button { border: none; border-radius: 15px; font-size: 18px; cursor: pointer; transition: 0.2s; color: white; background: rgba(255,255,255,0.1); }
        button:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .op { background: #3d4451; color: var(--accent); }
        .eq { background: var(--accent); color: #000; font-weight: bold; }
        .sci { background: rgba(0, 212, 255, 0.1); font-size: 14px; }
        
        canvas { background: rgba(255,255,255,0.02); border-radius: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="calc-side">
        <div style="font-weight: bold; margin-bottom: 20px;">EduGenius Pro <span style="color:var(--accent)">Smarter Math</span></div>
        <input id="display" placeholder="Enter expression..." autofocus>
        <div id="preview"></div>

        <div class="grid">
            <button class="op" onclick="clearAll()">AC</button>
            <button class="op" onclick="del()">DEL</button>
            <button class="op" onclick="add(' to ')">UNIT</button>
            <button class="op" onclick="add('/')">÷</button>

            <button onclick="add('7')">7</button><button onclick="add('8')">8</button><button onclick="add('9')">9</button>
            <button class="op" onclick="add('*')">×</button>

            <button onclick="add('4')">4</button><button onclick="add('5')">5</button><button onclick="add('6')">6</button>
            <button class="op" onclick="add('-')">−</button>

            <button onclick="add('1')">1</button><button onclick="add('2')">2</button><button onclick="add('3')">3</button>
            <button class="op" onclick="add('+')">+</button>

            <button onclick="add('0')">0</button><button onclick="add('.')">.</button>
            <button class="sci" onclick="add('f(x)=')">f(x)</button>
            <button class="eq" onclick="calculate()">=</button>

            <button class="sci" onclick="add('sin(')">sin</button>
            <button class="sci" onclick="add('sqrt(')">√</button>
            <button class="sci" onclick="add('det(')">DET</button>
            <button class="sci" onclick="drawGraph()">PLOT</button>
        </div>
    </div>

    <div class="graph-side">
        <div style="margin-bottom:10px;">Function Visualizer</div>
        <canvas id="graphCanvas"></canvas>
    </div>
</div>

<script>
    let expr = "";
    const display = document.getElementById('display');
    const preview = document.getElementById('preview');
    const ctx = document.getElementById('graphCanvas').getContext('2d');
    let chart;

    function add(val) {
        expr += val;
        display.value = expr;
        try {
            // Live Preview Logic
            if(expr.length > 0 && !expr.includes('f(x)')) {
                const res = math.evaluate(expr);
                preview.innerText = "= " + math.format(res, { precision: 10 });
            }
        } catch(e) {}
    }

    function clearAll() { expr = ""; display.value = ""; preview.innerText = ""; }
    function del() { expr = expr.slice(0, -1); display.value = expr; }

    function calculate() {
        try {
            const result = math.evaluate(expr);
            // Format for textbook display
            const formatted = math.format(result, { precision: 14 });
            preview.innerText = expr + " =";
            expr = formatted.toString();
            display.value = expr;
        } catch (err) {
            display.value = "Error";
            setTimeout(clearAll, 1500);
        }
    }

    // Best-in-world Feature: Live Graphing
    function drawGraph() {
        try {
            let funcStr = expr;
            if(expr.startsWith('f(x)=')) funcStr = expr.split('=')[1];
            
            const node = math.parse(funcStr);
            const compiled = node.compile();
            
            const xValues = math.range(-10, 10, 0.5).toArray();
            const yValues = xValues.map(x => compiled.evaluate({x: x}));

            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: xValues,
                    datasets: [{
                        label: 'f(x)',
                        data: yValues,
                        borderColor: '#00d4ff',
                        tension: 0.4,
                        fill: false
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { color: '#333' } }, y: { grid: { color: '#333' } } } }
            });
        } catch(e) { alert("Type a function with 'x' first! (e.g. x^2)"); }
    }
</script>
</body>
</html>
