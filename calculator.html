<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator – EduGenius AI</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #6a1b9a, #3f51b5);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.calc-container {
  width: 100%;
  max-width: 340px;
  background: #fff;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

h2 {
  color: #6a1b9a;
}

#display {
  width: 100%;
  padding: 14px;
  font-size: 22px;
  font-weight: bold;
  border-radius: 12px;
  border: none;
  background: #f3f3f3;
  text-align: right;
  margin-bottom: 10px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.buttons button {
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: #6a1b9a;
  color: white;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.buttons button:active {
  transform: scale(0.9);
}

.special { background: #ff9800 !important; }
.ai-btn { background: #00bcd4 !important; grid-column: span 2; }

#history {
  margin-top: 10px;
  max-height: 120px;
  overflow-y: auto;
  background: #f3e5f5;
  border-radius: 10px;
  padding: 8px;
  font-size: 13px;
  text-align: left;
}

#history p { margin: 4px 0; cursor: pointer; }

#explanation {
  margin-top: 10px;
  background: #e3f2fd;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  text-align: left;
}
</style>
</head>

<body>

<div class="calc-container">
<h2>🧮 EduGenius Calculator</h2>

<input type="text" id="display" disabled>

<div class="buttons">

<button onclick="square()">x²</button>
<button onclick="sqrt()">√</button>
<button onclick="percent()">%</button>
<button onclick="backspace()">⌫</button>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')" class="special">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')" class="special">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')" class="special">−</button>

<button onclick="press('0')">0</button>
<button onclick="clearDisplay()">C</button>
<button onclick="calculate()" class="special">=</button>
<button onclick="press('+')" class="special">+</button>

<button onclick="explain()" class="ai-btn">🤖 Explain</button>
<button onclick="clearHistory()">🧹</button>

</div>

<div id="history"></div>
<div id="explanation"></div>

</div>

<script>
const display = document.getElementById("display");
const historyBox = document.getElementById("history");
const explanationBox = document.getElementById("explanation");

// ✅ SMART INPUT
function press(val) {
  const last = display.value.slice(-1);

  if ("+-*/".includes(val) && "+-*/".includes(last)) return;

  display.value += val;
  liveResult();
}

// ✅ LIVE RESULT
function liveResult() {
  try {
    let result = Function('"use strict";return (' + display.value + ')')();
    explanationBox.innerHTML = "Live Result: " + result;
  } catch {
    explanationBox.innerHTML = "";
  }
}

// ✅ CALCULATE
function calculate() {
  try {
    let exp = display.value;
    let result = Function('"use strict";return (' + exp + ')')();

    display.value = Number(result.toFixed(6));

    let item = document.createElement("p");
    item.innerText = `${exp} = ${result}`;
    item.onclick = () => display.value = exp;

    historyBox.appendChild(item);

    if (historyBox.children.length > 10) {
      historyBox.removeChild(historyBox.firstChild);
    }

  } catch {
    alert("Invalid calculation");
  }
}

// ✅ CLEAR
function clearDisplay() { display.value = ""; explanationBox.innerHTML=""; }
function backspace() { display.value = display.value.slice(0, -1); }
function clearHistory() { historyBox.innerHTML = ""; }

// ✅ SCIENTIFIC
function square() { display.value = display.value * display.value; }
function sqrt() { display.value = Math.sqrt(display.value); }
function percent() { display.value = display.value / 100; }

// 🔥 BODMAS EXPLAIN
function explain() {
  let exp = display.value;

  if (!exp) return;

  let steps = "Step 1: " + exp + "<br><br>";
  let current = exp;

  try {
    // Multiply & Divide first
    let md = /(\d+\.?\d*)([\*\/])(\d+\.?\d*)/;

    while (md.test(current)) {
      current = current.replace(md, (m, a, op, b) => {
        let r = op === "*" ? a * b : a / b;
        steps += `${a} ${op==="*"?"×":"÷"} ${b} = ${r}<br>`;
        return r;
      });
    }

    // Add & Subtract
    let as = /(\d+\.?\d*)([\+\-])(\d+\.?\d*)/;

    while (as.test(current)) {
      current = current.replace(as, (m, a, op, b) => {
        let r = op === "+" ? Number(a)+Number(b) : a-b;
        steps += `${a} ${op} ${b} = ${r}<br>`;
        return r;
      });
    }

    steps += "<br>Final Answer = <b>" + current + "</b>";

    explanationBox.innerHTML = steps;

  } catch {
    explanationBox.innerHTML = "❌ Cannot explain";
  }
}

// ⌨️ KEYBOARD
document.addEventListener("keydown", function(e) {
  const key = e.key;

  if ("0123456789+-*/.".includes(key)) press(key);
  else if (key === "Enter") calculate();
  else if (key === "Backspace") backspace();
  else if (key === "Escape") clearDisplay();
});

// 🔥 DOUBLE CLICK CLEAR
display.addEventListener("dblclick", clearDisplay);
</script>

</body>
</html>
