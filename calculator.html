<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGenius Calculator V3</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #6a1b9a, #3f51b5);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.calc {
  width: 95%;
  max-width: 360px;
  background: white;
  border-radius: 20px;
  padding: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
  color: #6a1b9a;
  margin-bottom: 10px;
}

#display {
  width: 100%;
  padding: 15px;
  font-size: 22px;
  border: none;
  background: #f1f1f1;
  border-radius: 12px;
  text-align: right;
  outline: none;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 10px;
}

button {
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: #6a1b9a;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.92);
}

.op { background: #ff9800; }
.eq { background: #00bcd4; }
.zero { grid-column: span 2; }

#history {
  margin-top: 10px;
  background: #f3e5f5;
  padding: 8px;
  border-radius: 10px;
  max-height: 120px;
  overflow-y: auto;
  font-size: 13px;
}

#explain {
  margin-top: 10px;
  background: #e3f2fd;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  min-height: 40px;
}
</style>
</head>

<body>

<div class="calc">

<h2>🧮 EduGenius V3</h2>

<input id="display" disabled>

<div class="buttons">

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="op" onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="op" onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="op" onclick="press('-')">−</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="press('00')">00</button>
<button class="op" onclick="press('+')">+</button>

<button onclick="clearAll()">C</button>
<button onclick="back()">⌫</button>
<button class="eq" onclick="calc()">=</button>
<button class="eq" onclick="explain()">🤖 Explain</button>

</div>

<div id="history"></div>
<div id="explain"></div>

</div>

<script>

let display = document.getElementById("display");
let history = document.getElementById("history");
let explainBox = document.getElementById("explain");

/* ================= SAFE INPUT ================= */
function press(v) {
  let last = display.value.slice(-1);

  if ("+-*/".includes(v) && "+-*/".includes(last)) return;

  display.value += v;
}

/* ================= CLEAR ================= */
function clearAll() {
  display.value = "";
  explainBox.innerHTML = "";
}

function back() {
  display.value = display.value.slice(0, -1);
}

/* ================= TOKENIZER ================= */
function tokenize(exp) {
  return exp.match(/\d+\.?\d*|[+\-*/]/g);
}

/* ================= TRUE BODMAS ENGINE ================= */
function solve(exp) {

  let tokens = tokenize(exp);
  let log = [];

  function apply(op) {
    while (tokens.includes(op)) {
      for (let i = 0; i < tokens.length; i++) {
        if (tokens[i] === op) {

          let a = parseFloat(tokens[i - 1]);
          let b = parseFloat(tokens[i + 1]);
          let r = 0;

          if (op === "/") r = a / b;
          if (op === "*") r = a * b;
          if (op === "+") r = a + b;
          if (op === "-") r = a - b;

          log.push(`${a} ${op} ${b} = ${r}`);

          tokens.splice(i - 1, 3, r.toString());
          break;
        }
      }
    }
  }

  log.push("Step 1: Division");
  apply("/");

  log.push("Step 2: Multiplication");
  apply("*");

  log.push("Step 3: Addition");
  apply("+");

  log.push("Step 4: Subtraction");
  apply("-");

  return {
    result: tokens[0],
    log: log
  };
}

/* ================= CALCULATE ================= */
function calc() {
  try {
    let exp = display.value;
    let { result } = solve(exp);

    display.value = Number(result);

    let p = document.createElement("p");
    p.innerText = exp + " = " + result;
    history.appendChild(p);

  } catch {
    alert("Invalid Expression");
  }
}

/* ================= EXPLAIN ================= */
function explain() {

  let exp = display.value;
  if (!exp) return;

  let { result, log } = solve(exp);

  let out = "🤖 Step-by-step (BODMAS):<br><br>";

  log.forEach(s => {
    out += "• " + s + "<br>";
  });

  out += "<br><b>Final Answer = " + result + "</b>";

  explainBox.innerHTML = out;
}

/* ================= KEYBOARD ================= */
document.addEventListener("keydown", e => {
  if ("0123456789+-*/.".includes(e.key)) press(e.key);
  else if (e.key === "Enter") calc();
  else if (e.key === "Backspace") back();
  else if (e.key === "Escape") clearAll();
});

</script>

</body>
</html>
