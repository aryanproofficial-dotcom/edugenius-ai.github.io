<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGenius Calculator</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #6a1b9a, #3f51b5);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.calc-container {
  width: 100%;
  max-width: 340px;
  background: white;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  color: #6a1b9a;
}

#display {
  width: 100%;
  padding: 14px;
  font-size: 22px;
  font-weight: bold;
  border: none;
  background: #f3f3f3;
  border-radius: 12px;
  text-align: right;
  margin-bottom: 10px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

button {
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: #6a1b9a;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.92);
}

.special { background: #ff9800; }
.ai { background: #00bcd4; grid-column: span 2; }

#history {
  margin-top: 10px;
  max-height: 110px;
  overflow-y: auto;
  background: #f3e5f5;
  padding: 8px;
  border-radius: 10px;
  font-size: 13px;
}

#explainBox {
  margin-top: 10px;
  background: #e3f2fd;
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
  min-height: 40px;
}
</style>
</head>

<body>

<div class="calc-container">

<h2>🧮 EduGenius Calculator</h2>

<input type="text" id="display" disabled>

<div class="buttons">

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')" class="special">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')" class="special">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')" class="special">−</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="press('00')">00</button>
<button onclick="press('+')" class="special">+</button>

<button onclick="clearDisplay()">C</button>
<button onclick="backspace()">⌫</button>
<button onclick="calculate()" class="special">=</button>
<button onclick="explain()" class="ai">🤖 Explain</button>

</div>

<div id="history"></div>
<div id="explainBox"></div>

</div>

<script>

const display = document.getElementById("display");
const historyBox = document.getElementById("history");
const explainBox = document.getElementById("explainBox");

/* ================= INPUT ================= */
function press(val) {
  const last = display.value.slice(-1);
  if ("+-*/".includes(val) && "+-*/".includes(last)) return;

  display.value += val;
  live();
}

/* ================= LIVE RESULT ================= */
function live() {
  try {
    let r = Function('"use strict";return (' + display.value + ')')();
    explainBox.innerHTML = "Live Result: " + r;
  } catch {
    explainBox.innerHTML = "";
  }
}

/* ================= BASIC ACTIONS ================= */
function clearDisplay() {
  display.value = "";
  explainBox.innerHTML = "";
}

function backspace() {
  display.value = display.value.slice(0, -1);
}

/* ================= CALCULATE ================= */
function calculate() {
  try {
    let result = Function('"use strict";return (' + display.value + ')')();

    display.value = Number(result.toFixed(6));

    let item = document.createElement("p");
    item.innerText = display.value + " = " + result;

    historyBox.appendChild(item);

  } catch {
    alert("Invalid Expression");
  }
}

/* ================= TOKENIZER ================= */
function tokenize(exp) {
  return exp.match(/(\d+\.?\d*|[+\-*/])/g);
}

/* ================= FIXED BODMAS ENGINE ================= */
function solveBODMAS(tokens) {

  let log = [];

  function process(op) {
    while (tokens.includes(op)) {
      for (let i = 0; i < tokens.length; i++) {
        if (tokens[i] === op) {

          let a = parseFloat(tokens[i - 1]);
          let b = parseFloat(tokens[i + 1]);
          let res = 0;

          if (op === "/") res = a / b;
          if (op === "*") res = a * b;
          if (op === "+") res = a + b;
          if (op === "-") res = a - b;

          log.push(`${a} ${op} ${b} = ${res}`);

          tokens.splice(i - 1, 3, res.toString());
          break;
        }
      }
    }
  }

  log.push("Step 1: Division (÷)");
  process("/");

  log.push("Step 2: Multiplication (×)");
  process("*");

  log.push("Step 3: Addition (+)");
  process("+");

  log.push("Step 4: Subtraction (−)");
  process("-");

  return { result: tokens[0], log };
}

/* ================= EXPLAIN ================= */
function explain() {

  let exp = display.value;
  if (!exp) return;

  let tokens = tokenize(exp);
  let { result, log } = solveBODMAS(tokens);

  let output = "🤖 Step-by-step (Correct BODMAS Order):<br><br>";

  log.forEach(step => output += step + "<br>");

  output += "<br><b>Final Answer = " + result + "</b>";

  explainBox.innerHTML = output;
}

/* ================= KEYBOARD ================= */
document.addEventListener("keydown", (e) => {
  if ("0123456789+-*/.".includes(e.key)) press(e.key);
  else if (e.key === "Enter") calculate();
  else if (e.key === "Backspace") backspace();
  else if (e.key === "Escape") clearDisplay();
});

</script>

</body>
</html>
