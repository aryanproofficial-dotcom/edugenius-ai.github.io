<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGenius Calculator Pro</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  font-family:Arial;
}

.calc{
  width:390px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);
  border-radius:28px;
  padding:16px;
  box-shadow:0 25px 70px rgba(0,0,0,0.7);
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:8px;
}

.history{
  height:55px;
  font-size:12px;
  opacity:0.6;
  overflow:auto;
  margin-bottom:6px;
}

#display{
  width:100%;
  height:65px;
  font-size:28px;
  text-align:right;
  border:none;
  outline:none;
  background:transparent;
  color:white;
  margin-bottom:12px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  padding:15px;
  font-size:14px;
  border:none;
  border-radius:16px;
  cursor:pointer;
  background:rgba(255,255,255,0.1);
  color:white;
}

button:hover{
  background:#38bdf8;
  color:black;
}

.equal{ background:#22c55e; }
.clear{ background:#ef4444; }
</style>
</head>

<body>

<div class="calc">

<div class="header">
  <div>EduGenius Calculator Pro</div>
  <div>Mode: <span id="mode">DEG</span></div>
</div>

<div class="history" id="history"></div>

<input id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearAll()">C</button>
<button onclick="back()">⌫</button>
<button onclick="append('/')">/</button>
<button onclick="append('*')">*</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('-')">-</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('+')">+</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="equal" onclick="calculate()">=</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>

<button onclick="append('sin')">sin</button>
<button onclick="append('cos')">cos</button>
<button onclick="append('tan')">tan</button>
<button onclick="append('sqrt')">√</button>

<button onclick="append('log')">log</button>
<button onclick="append('ln')">ln</button>
<button onclick="append('PI')">π</button>
<button onclick="append('E')">e</button>

</div>
</div>

<script>

let expr = "";
let mode = "DEG";

const display = document.getElementById("display");
const historyBox = document.getElementById("history");

// constants
const PI = Math.PI;
const E = Math.E;

// helpers
function toRad(x){
  return mode === "DEG" ? x * Math.PI / 180 : x;
}

// FUNCTIONS
const funcs = {
  sin: x => Math.sin(toRad(x)),
  cos: x => Math.cos(toRad(x)),
  tan: x => Math.tan(toRad(x)),
  sqrt: x => Math.sqrt(x),
  log: x => Math.log10(x),
  ln: x => Math.log(x)
};

// TOKENIZER
function tokenize(str){
  return str.match(/PI|E|sin|cos|tan|sqrt|log|ln|\d+(\.\d+)?|[()+\-*/^]/g) || [];
}

// precedence
function prec(op){
  if(op === "+" || op === "-") return 1;
  if(op === "*" || op === "/") return 2;
  if(op === "^") return 3;
  return 0;
}

// SHUNTING YARD -> RPN
function toRPN(tokens){
  let output = [];
  let ops = [];

  for(let t of tokens){

    if(!isNaN(t) || t === "PI" || t === "E"){
      output.push(t);
    }
    else if(funcs[t]){
      ops.push(t);
    }
    else if(t === ","){
      while(ops.length && ops[ops.length-1] !== "("){
        output.push(ops.pop());
      }
    }
    else if("+-*/^".includes(t)){
      while(
        ops.length &&
        prec(ops[ops.length-1]) >= prec(t)
      ){
        output.push(ops.pop());
      }
      ops.push(t);
    }
    else if(t === "("){
      ops.push(t);
    }
    else if(t === ")"){
      while(ops.length && ops[ops.length-1] !== "("){
        output.push(ops.pop());
      }
      ops.pop();

      if(funcs[ops[ops.length-1]]){
        output.push(ops.pop());
      }
    }
  }

  while(ops.length){
    output.push(ops.pop());
  }

  return output;
}

// EVALUATE RPN
function evalRPN(rpn){
  let stack = [];

  for(let t of rpn){

    if(!isNaN(t)){
      stack.push(parseFloat(t));
    }
    else if(t === "PI"){
      stack.push(PI);
    }
    else if(t === "E"){
      stack.push(E);
    }
    else if(funcs[t]){
      let a = stack.pop();
      stack.push(funcs[t](a));
    }
    else{
      let b = stack.pop();
      let a = stack.pop();

      switch(t){
        case "+": stack.push(a+b); break;
        case "-": stack.push(a-b); break;
        case "*": stack.push(a*b); break;
        case "/": stack.push(a/b); break;
        case "^": stack.push(Math.pow(a,b)); break;
      }
    }
  }

  return stack[0];
}

// MAIN CALC
function calculate(){
  try{
    let tokens = tokenize(expr);
    let rpn = toRPN(tokens);
    let res = evalRPN(rpn);

    if(isNaN(res)) throw Error();

    historyBox.innerHTML += expr + " = " + res + "<br>";
    expr = res.toString();
    display.value = expr;
  }catch{
    display.value = "Error";
  }
}

// UI
function append(v){
  expr += v;
  display.value = expr;
}

function clearAll(){
  expr = "";
  display.value = "";
}

function back(){
  expr = expr.slice(0,-1);
  display.value = expr;
}

// keyboard
document.addEventListener("keydown", e=>{
  if("0123456789+-*/().".includes(e.key)) append(e.key);
  else if(e.key === "Enter") calculate();
  else if(e.key === "Backspace") back();
});

</script>

</body>
</html>
