<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduGenius Pro Calculator</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
    }

    .calculator {
        width: 340px;
        background: #111827;
        border-radius: 20px;
        padding: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .screen {
        background: #1f2937;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 10px;
    }

    #input {
        width: 100%;
        font-size: 20px;
        background: transparent;
        border: none;
        color: white;
        outline: none;
    }

    #result {
        text-align: right;
        font-size: 18px;
        opacity: 0.7;
        margin-top: 5px;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }

    button {
        padding: 15px;
        font-size: 16px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background: #1f2937;
        color: white;
        transition: 0.2s;
    }

    button:hover {
        background: #374151;
    }

    .equal {
        background: #22c55e;
    }

    .equal:hover {
        background: #16a34a;
    }

    .clear {
        background: #ef4444;
    }

    .clear:hover {
        background: #dc2626;
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    .toggle {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 8px;
        background: #334155;
    }

    .history {
        margin-top: 10px;
        max-height: 80px;
        overflow-y: auto;
        font-size: 12px;
        opacity: 0.8;
    }
</style>
</head>

<body>

<div class="calculator">

    <div class="topbar">
        <button class="toggle" onclick="toggleMode()">Scientific</button>
        <button class="toggle" onclick="toggleTheme()">Theme</button>
    </div>

    <div class="screen">
        <input id="input" type="text" oninput="liveResult()" placeholder="0"/>
        <div id="result">0</div>
    </div>

    <div class="buttons" id="buttons">

        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button class="clear" onclick="clearAll()">C</button>

        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="press('/')">÷</button>

        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button onclick="press('*')">×</button>

        <button onclick="press('0')">0</button>
        <button onclick="press('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
        <button onclick="press('-')">−</button>

        <button onclick="press('+')">+</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="press('(')">(</button>
        <button onclick="press(')')">)</button>

    </div>

    <div class="history" id="history"></div>

</div>

<script>
let scientific = false;
let dark = true;

function press(val){
    document.getElementById("input").value += val;
    liveResult();
}

function clearAll(){
    document.getElementById("input").value = "";
    document.getElementById("result").innerText = "0";
}

function backspace(){
    let val = document.getElementById("input").value;
    document.getElementById("input").value = val.slice(0, -1);
    liveResult();
}

function calculate(){
    let input = document.getElementById("input").value;
    try{
        let res = Function("return " + input)();
        document.getElementById("result").innerText = res;

        document.getElementById("history").innerHTML += 
        `<div>${input} = ${res}</div>`;
    } catch {
        document.getElementById("result").innerText = "Error";
    }
}

function liveResult(){
    let input = document.getElementById("input").value;
    try{
        let res = Function("return " + input)();
        document.getElementById("result").innerText = res;
    } catch {
        document.getElementById("result").innerText = "";
    }
}

function toggleMode(){
    scientific = !scientific;
    alert("Scientific mode: " + (scientific ? "ON (upgrade coming next version)" : "OFF"));
}

function toggleTheme(){
    dark = !dark;
    document.body.style.background = dark ? "#0f172a" : "#e5e7eb";
    document.body.style.color = dark ? "white" : "black";
}
</script>

</body>
</html>
