<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGenius Pro | Ultimate Upgrade</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.all.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg:#070a12;
    --panel:rgba(255,255,255,0.06);
    --accent:#00d4ff;
    --accent2:#ff4df0;
    --text:#fff;
}

body{
    margin:0;
    font-family:Segoe UI;
    background:var(--bg);
    color:var(--text);
    display:flex;
    height:100vh;
    overflow:hidden;
}

.app{
    display:flex;
    width:100%;
    max-width:1300px;
    margin:auto;
    gap:15px;
    padding:15px;
}

/* LEFT */
.calc{
    flex:1;
    background:var(--panel);
    border-radius:25px;
    padding:20px;
    display:flex;
    flex-direction:column;
    backdrop-filter:blur(15px);
}

#display{
    font-size:30px;
    background:transparent;
    border:none;
    color:var(--accent);
    text-align:right;
    outline:none;
}

#preview{
    text-align:right;
    opacity:0.6;
    margin-bottom:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    flex:1;
}

button{
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    background:rgba(255,255,255,0.1);
    transition:0.2s;
}
button:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,0.2);
}

.op{color:var(--accent)}
.eq{background:var(--accent); color:#000; font-weight:bold;}
.sci{color:var(--accent2)}

/* RIGHT */
.right{
    flex:1.3;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.panel{
    background:var(--panel);
    border-radius:25px;
    padding:15px;
    backdrop-filter:blur(15px);
}

canvas{
    width:100%;
    height:300px;
}

/* HISTORY */
#history{
    font-size:13px;
    max-height:120px;
    overflow:auto;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="app">

<!-- CALCULATOR -->
<div class="calc">
<h3>EduGenius Pro <span style="color:var(--accent)">UPGRADED</span></h3>

<input id="display" placeholder="Enter expression...">
<div id="preview"></div>

<div class="grid">

<button onclick="clearAll()" class="op">AC</button>
<button onclick="del()" class="op">DEL</button>
<button onclick="addAns()" class="op">ANS</button>
<button onclick="add('/')">÷</button>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('*')">×</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('-')">−</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('+')">+</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="add('sin(')" class="sci">sin</button>
<button onclick="calculate()" class="eq">=</button>

<button onclick="add('sqrt(')" class="sci">√</button>
<button onclick="add('x^2')" class="sci">x²</button>
<button onclick="add('f(x)=')" class="sci">f(x)</button>
<button onclick="drawGraph()" class="sci">GRAPH</button>

</div>
</div>

<!-- RIGHT SIDE -->
<div class="right">

<div class="panel">
<h4>Graph</h4>
<canvas id="graph"></canvas>
</div>

<div class="panel">
<h4>History</h4>
<button onclick="clearHistory()" class="op">Clear History</button>
<div id="history"></div>
</div>

</div>

</div>

<script>

let expr="";
let ans=0;
let history=[];
let chart;

const display=document.getElementById("display");
const preview=document.getElementById("preview");
const hist=document.getElementById("history");

function add(v){
    expr+=v;
    display.value=expr;
    livePreview();
}

function addAns(){
    expr+=ans;
    display.value=expr;
}

function del(){
    expr=expr.slice(0,-1);
    display.value=expr;
    livePreview();
}

function clearAll(){
    expr="";
    display.value="";
    preview.innerText="";
}

function livePreview(){
    try{
        if(expr && !expr.includes("f(x)")){
            let r=math.evaluate(expr);
            preview.innerText="= "+math.format(r,{precision:8});
        }
    }catch(e){}
}

function calculate(){
    try{
        let result=math.evaluate(expr);
        ans=result;

        let line=expr+" = "+result;
        history.push(line);
        renderHistory();

        preview.innerText=line;
        expr=result.toString();
        display.value=expr;
    }catch(e){
        display.value="Error";
        setTimeout(clearAll,1200);
    }
}

function renderHistory(){
    hist.innerHTML=history.slice(-10).map(h=>"• "+h).join("<br>");
}

function clearHistory(){
    history=[];
    renderHistory();
}

function drawGraph(){
    try{
        let f=expr.replace("f(x)=", "");

        const node=math.parse(f);
        const code=node.compile();

        let xVals=math.range(-10,10,0.5).toArray();
        let yVals=xVals.map(x=>code.evaluate({x}));

        if(chart) chart.destroy();

        chart=new Chart(document.getElementById("graph"),{
            type:"line",
            data:{
                labels:xVals,
                datasets:[{
                    data:yVals,
                    borderColor:"#00d4ff",
                    tension:0.3
                }]
            },
            options:{
                responsive:true,
                maintainAspectRatio:false
            }
        });

    }catch(e){
        alert("Enter function like x^2 or sin(x)");
    }
}

</script>

</body>
</html>
