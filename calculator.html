<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGenius Pro Calculator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.min.js"></script>

<style>
body{
    margin:0;
    font-family: system-ui;
    background:#0b0f17;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#e5e7eb;
}

.calculator{
    width:360px;
    background:#111827;
    border-radius:16px;
    padding:16px;
    border:1px solid #1f2937;
}

.topbar{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-bottom:10px;
    align-items:center;
}

.mode{
    opacity:0.7;
}

button{
    background:#0f172a;
    border:1px solid #1f2937;
    color:#e5e7eb;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    border-color:#374151;
}

.screen{
    background:#0b1220;
    padding:12px;
    border-radius:12px;
    margin-bottom:12px;
}

#input{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:20px;
}

#result{
    text-align:right;
    margin-top:6px;
    font-size:14px;
    opacity:0.7;
}

.grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
}

.equal{
    background:#1f2937;
}

.clear{
    background:#7f1d1d;
}

.history{
    margin-top:10px;
    font-size:12px;
    max-height:80px;
    overflow:auto;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="calculator">

<div class="topbar">
    <div>EduGenius Pro</div>
    <div class="mode">Mode: <span id="mode">DEG</span></div>
    <div>
        <button onclick="toggleAngle()">↻</button>
        <button onclick="clearAll()">C</button>
    </div>
</div>

<div class="screen">
    <input id="input" oninput="live()" placeholder="Enter expression">
    <div id="result">0</div>
</div>

<div class="grid">

<button onclick="press('sin(')">sin</button>
<button onclick="press('cos(')">cos</button>
<button onclick="press('tan(')">tan</button>
<button onclick="press('log(')">log</button>
<button onclick="press('ln(')">ln</button>

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>
<button onclick="press('sqrt(')">√</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>
<button onclick="press('^')">^</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">−</button>
<button onclick="press('pi')">π</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="press('(')">(</button>
<button onclick="press(')')">)</button>
<button onclick="press('+')">+</button>

<button onclick="press('e')">e</button>
<button onclick="back()">⌫</button>
<button onclick="calculate()" class="equal">=</button>
<button onclick="clearAll()" class="clear">AC</button>

</div>

<div class="history" id="history"></div>

</div>

<script>

// ================= SETTINGS =================
let angleMode = "deg";

// ================= CUSTOM FUNCTIONS =================
math.import({
    ln: x => math.log(x),         // natural log
    log: x => math.log10(x),      // base 10 log
    fact: x => math.factorial(x)  // factorial
}, { override: true });

// ================= INPUT =================
function press(v){
    input.value += v;
    live();
}

function back(){
    input.value = input.value.slice(0,-1);
    live();
}

function clearAll(){
    input.value="";
    result.innerText="0";
}

// ================= ANGLE MODE =================
function toggleAngle(){
    angleMode = angleMode === "deg" ? "rad" : "deg";
    document.getElementById("mode").innerText = angleMode.toUpperCase();
}

// ================= SMART PARSER =================
function parseExpr(expr){

    expr = expr.replace(/\s+/g,'');

    // implicit multiplication
    expr = expr
    .replace(/(\d)([a-zA-Z])/g,'$1*$2')
    .replace(/(\d)\(/g,'$1*(')
    .replace(/\)(\d)/g,')*$1')
    .replace(/\)([a-zA-Z])/g,')*$1')
    .replace(/pi(\d)/g,'pi*$1');

    // factorial support
    expr = expr.replace(/(\d+)!/g,'fact($1)');

    // auto function brackets
    expr = expr
    .replace(/sin(\d+)/g,'sin($1)')
    .replace(/cos(\d+)/g,'cos($1)')
    .replace(/tan(\d+)/g,'tan($1)');

    // DEG mode
    if(angleMode==="deg"){
        expr = expr
        .replace(/sin\(/g,'sin((pi/180)*')
        .replace(/cos\(/g,'cos((pi/180)*')
        .replace(/tan\(/g,'tan((pi/180)*');
    }

    return expr;
}

// ================= CLEAN RESULT =================
function clean(r){
    if(typeof r==="number"){
        if(!isFinite(r)) return "Math Error";
        return parseFloat(r.toFixed(10));
    }
    return r;
}

// ================= LIVE =================
function live(){
    try{
        let exp = parseExpr(input.value || "0");
        let r = math.evaluate(exp);
        result.innerText = clean(r);
    }catch{
        result.innerText="";
    }
}

// ================= CALCULATE =================
function calculate(){
    try{
        let exp = input.value;
        let parsed = parseExpr(exp);
        let r = clean(math.evaluate(parsed));

        result.innerText = r;
        history.innerHTML += `<div>${exp} = ${r}</div>`;
    }catch{
        result.innerText="Error";
    }
}

// ================= KEYBOARD =================
document.addEventListener("keydown", e=>{
    if(e.key==="Enter") calculate();
    else if(e.key==="Backspace") back();
    else if("0123456789+-*/().".includes(e.key)) press(e.key);
});

</script>

</body>
</html>
