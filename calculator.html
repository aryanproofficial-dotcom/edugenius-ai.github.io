<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EduGenius Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:420px;
  margin:auto;
  padding:10px;
}

.screen{
  background:#111827;
  padding:15px;
  border-radius:10px;
  font-size:22px;
  min-height:60px;
  word-wrap:break-word;
}

.result{
  font-size:18px;
  color:#22c55e;
  margin-top:5px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:10px;
}

button{
  padding:15px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

button:active{
  background:#374151;
}

.science{
  grid-column: span 4;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.history{
  margin-top:10px;
  background:#111827;
  padding:10px;
  border-radius:10px;
  max-height:150px;
  overflow:auto;
}

.history-item{
  font-size:14px;
  border-bottom:1px solid #222;
  padding:5px 0;
}

.ai-box{
  margin-top:10px;
  padding:10px;
  background:#1e293b;
  border-radius:10px;
  font-size:13px;
}
</style>
</head>

<body>
<div class="container">

<div class="screen" id="display">0</div>
<div class="result" id="result"></div>

<!-- SCIENTIFIC -->
<div class="science">
<button onclick="add('sin(')">sin</button>
<button onclick="add('cos(')">cos</button>
<button onclick="add('tan(')">tan</button>
<button onclick="add('log(')">log</button>

<button onclick="add('ln(')">ln</button>
<button onclick="add('sqrt(')">√</button>
<button onclick="add('^2')">x²</button>
<button onclick="clearAll()">C</button>
</div>

<!-- MAIN KEYS -->
<div class="buttons">

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">÷</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">×</button>
<button onclick="add('*')">*</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">-</button>

<button onclick="add('0')">0</button>
<button onclick="add('00')">00</button>
<button onclick="add('000')">000</button>
<button onclick="add('+')">+</button>

<button onclick="calculate()">=</button>
<button onclick="back()">⌫</button>
<button onclick="add('.')">.</button>
<button onclick="add('(')">(</button>
<button onclick="add(')')">)</button>

</div>

<!-- HISTORY -->
<div class="history" id="history"></div>

<!-- AI EXPLANATION -->
<div class="ai-box" id="aiBox">AI Explanation will appear here...</div>

</div>

<script>
let expr = "";

function add(val){
  expr += val;
  document.getElementById("display").innerText = expr;
  liveResult();
}

function back(){
  expr = expr.slice(0,-1);
  document.getElementById("display").innerText = expr || "0";
  liveResult();
}

function clearAll(){
  expr = "";
  document.getElementById("display").innerText = "0";
  document.getElementById("result").innerText = "";
}

function liveResult(){
  try{
    let r = safeEval(expr);
    if(r !== undefined){
      document.getElementById("result").innerText = "= " + r;
    }
  }catch(e){}
}

/* SAFE PARSER (NO eval) */
function safeEval(str){
  str = str.replace(/sin/g,"Math.sin")
           .replace(/cos/g,"Math.cos")
           .replace(/tan/g,"Math.tan")
           .replace(/log/g,"Math.log10")
           .replace(/ln/g,"Math.log")
           .replace(/sqrt/g,"Math.sqrt")
           .replace(/\^2/g,"**2");

  // Only allow safe chars
  if(/[^0-9+\-*/(). Mathsincoalgqrt]*$/.test(str)) return;

  return Function('"use strict"; return ('+str+')')();
}

function calculate(){
  try{
    let result = safeEval(expr);
    document.getElementById("result").innerText = "= " + result;

    addHistory(expr + " = " + result);
    aiExplain(expr, result);

    expr = result.toString();
    document.getElementById("display").innerText = expr;

  }catch(e){
    document.getElementById("result").innerText = "Error";
  }
}

/* HISTORY SYSTEM */
function addHistory(text){
  let div = document.createElement("div");
  div.className = "history-item";
  div.innerText = text;
  document.getElementById("history").prepend(div);
}

/* AI EXPLANATION (basic logic) */
function aiExplain(expression, result){
  document.getElementById("aiBox").innerText =
  "AI: The expression '" + expression +
  "' is solved using BODMAS rules → final answer = " + result;
}
</script>

</body>
</html>
