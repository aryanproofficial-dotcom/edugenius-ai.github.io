<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGenius Calculator Ultimate</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:linear-gradient(135deg,#070a2b,#1c2250,#070a2b);
}

.calc{
  width:430px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(45px);
  border-radius:40px;
  padding:18px;
  box-shadow:0 50px 140px rgba(0,0,0,0.9);
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:10px;
  opacity:0.9;
}

.mode{
  cursor:pointer;
  color:#00d4ff;
}

.history{
  height:100px;
  font-size:12px;
  opacity:0.75;
  overflow:auto;
  margin-bottom:10px;
  padding:8px;
  border-radius:14px;
  background:rgba(255,255,255,0.05);
}

#display{
  width:100%;
  height:90px;
  font-size:40px;
  text-align:right;
  border:none;
  outline:none;
  background:transparent;
  color:white;
  margin-bottom:14px;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

button{
  padding:18px;
  font-size:16px;
  border:none;
  border-radius:26px;
  cursor:pointer;
  transition:0.12s;
  color:white;
  user-select:none;
}

button:active{
  transform:scale(0.88);
}

/* colors */
.num{ background:#2b2f4f; }
.op{ background:#ff6a00; }
.func{ background:#2aa9ff; }
.equal{ background:#00ff9d; color:black; }
.clear{ background:#ff3b30; }
.hist{ background:#7b2cff; }
.mem{ background:#ffcc00; color:black; }
</style>
</head>

<body>

<div class="calc">

<div class="header">
  <div>EduGenius Ultimate</div>
  <div class="mode" onclick="toggleMode()">MODE: <span id="modeText">DEG</span></div>
</div>

<div class="history" id="history"></div>

<input id="display" readonly>

<div class="buttons">

<!-- CLEAR -->
<button class="clear" onclick="clearAll()">C</button>
<button class="hist" onclick="clearHistory()">H</button>
<button class="mem" onclick="memoryClear()">MC</button>
<button class="mem" onclick="memoryRecall()">MR</button>

<!-- ROW 2 -->
<button class="num" onclick="append('7')">7</button>
<button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button>
<button class="mem" onclick="memoryAdd()">M+</button>

<!-- ROW 3 -->
<button class="num" onclick="append('4')">4</button>
<button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button>
<button class="mem" onclick="memorySub()">M-</button>

<!-- ROW 4 -->
<button class="num" onclick="append('1')">1</button>
<button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button>
<button class="op" onclick="append('+')">+</button>

<!-- ROW 5 -->
<button class="num" onclick="append('0')">0</button>
<button class="num" onclick="append('.')">.</button>
<button class="op" onclick="append('-')">-</button>
<button class="equal" onclick="calculate()">=</button>

<!-- SCIENTIFIC -->
<button class="func" onclick="append('sin(')">sin</button>
<button class="func" onclick="append('cos(')">cos</button>
<button class="func" onclick="append('tan(')">tan</button>
<button class="op" onclick="append('*')">*</button>

<button class="func" onclick="append('sqrt(')">√</button>
<button class="func" onclick="append('log(')">log</button>
<button class="func" onclick="append('ln(')">ln</button>
<button class="op" onclick="append('/')">/</button>

<button class="num" onclick="append('(')">(</button>
<button class="num" onclick="append(')')">)</button>
<button class="num" onclick="append('PI')">π</button>
<button class="num" onclick="append('E')">e</button>

</div>
</div>

<script>

let expr = "";
let mode = "DEG";
let memory = 0;

const display = document.getElementById("display");
const historyBox = document.getElementById("history");
const modeText = document.getElementById("modeText");

const PI = Math.PI;
const E = Math.E;

// MODE
function toggleMode(){
  mode = mode === "DEG" ? "RAD" : "DEG";
  modeText.innerText = mode;
}

// TRIG
function toRad(x){
  return mode === "DEG" ? x * Math.PI / 180 : x;
}

const sin = x => Math.sin(toRad(x));
const cos = x => Math.cos(toRad(x));
const tan = x => Math.tan(toRad(x));

const sqrt = x => Math.sqrt(x);
const log = x => Math.log10(x);
const ln = x => Math.log(x);

// CLEAN INPUT
function fix(s){
  return s
    .replace(/\+\+/g,'+')
    .replace(/--/g,'-')
    .replace(/\*\*/g,'^')
    .replace(/\/\//g,'/');
}

// SAFE CALC
function calc(str){
  try{
    return Function("sin","cos","tan","sqrt","log","ln","PI","E",
      "return (" + str + ")"
    )(sin,cos,tan,sqrt,log,ln,PI,E);
  }catch{
    return null;
  }
}

// AUTO BRACKETS
function autoClose(s){
  let open = (s.match(/\(/g)||[]).length;
  let close = (s.match(/\)/g)||[]).length;
  return s + ")".repeat(open-close);
}

// UPDATE
function update(){
  if(expr === ""){
    display.value = "";
    return;
  }

  let res = calc(fix(expr));

  if(res === null || isNaN(res)){
    display.value = expr;
  }else{
    display.value = expr + " = " + res;
  }
}

// INPUT
function append(v){
  let last = expr.slice(-1);
  if("+-*/".includes(last) && "+-*/".includes(v)) return;

  expr += v;
  update();
}

// CLEAR
function clearAll(){
  expr = "";
  display.value = "";
}

function clearHistory(){
  historyBox.innerHTML = "";
}

// CALCULATE
function calculate(){
  let finalExpr = autoClose(fix(expr));
  let res = calc(finalExpr);

  if(res !== null && !isNaN(res)){
    historyBox.innerHTML += expr + " = " + res + "<br>";
    historyBox.scrollTop = historyBox.scrollHeight;

    expr = res.toString();
    display.value = expr;
  }else{
    display.value = "Error";
  }
}

/* MEMORY SYSTEM */
function memoryAdd(){
  let r = calc(expr);
  if(r !== null) memory += r;
}

function memorySub(){
  let r = calc(expr);
  if(r !== null) memory -= r;
}

function memoryRecall(){
  expr += memory.toString();
  update();
}

function memoryClear(){
  memory = 0;
}

// KEYBOARD
document.addEventListener("keydown", e=>{
  if("0123456789+-*/().".includes(e.key)) append(e.key);
  else if(e.key === "Enter") calculate();
  else if(e.key === "Backspace") expr = expr.slice(0,-1), update();
});

</script>

</body>
</html>
