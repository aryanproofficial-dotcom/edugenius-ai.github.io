<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – EduGenius AI</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.6;
      animation: move 10s infinite alternate;
    }

    body::before {
      background: #00f2ff;
      top: -100px;
      left: -100px;
    }

    body::after {
      background: #8a2be2;
      bottom: -100px;
      right: -100px;
    }

    @keyframes move {
      0% { transform: translate(0, 0); }
      100% { transform: translate(100px, 100px); }
    }

    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 350px;
      margin: auto;
      top: 50%;
      transform: translateY(-50%);
      padding: 25px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      backdrop-filter: blur(15px);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
      text-align: center;
      color: white;
    }

    .logo {
      width: 70px;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 15px;
    }

    .login-form input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .login-form input::placeholder {
      color: #ccc;
    }

    .login-form button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #00f2ff, #8a2be2);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-form button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00f2ff;
    }

    .new-account {
      margin-top: 10px;
      font-size: 14px;
    }

    .new-account a {
      color: #00f2ff;
      text-decoration: none;
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="logo.png" alt="EduGenius AI Logo" class="logo">

    <h1>EduGenius AI</h1>
    <p class="tagline">Smart Learning, Smarter Future</p>

    <h2>Login</h2>

    <form class="login-form" onsubmit="loginWithEmail(event)">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <p class="new-account">
      Don't have an account? <a href="signup.html">Create New Account</a>
    </p>

    <footer>© 2026 EduGenius AI</footer>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBCX7uxYy_3XdjZhUpsh5qZ5fTy-Ai3YqQ",
      authDomain: "edugenius-ai69.firebaseapp.com",
      projectId: "edugenius-ai69",
      appId: "1:108519318021:web:f05342a38336895945f26c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function loginWithEmail(event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Please fill all fields");
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          window.location.href = "home.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    }
  </script>

</body>
</html>
