<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – EduGenius AI</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;

      /* 🔥 Smooth futuristic background */
      background:
        radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.25), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(138, 43, 226, 0.25), transparent 40%),
        linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Container */
    .container {
      width: 90%;
      max-width: 350px;
      padding: 25px;

      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);

      text-align: center;
      color: white;
    }

    .logo {
      width: 70px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 5px 0;
    }

    .tagline {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 15px;
    }

    h2 {
      margin-bottom: 10px;
    }

    /* Inputs */
    .login-form input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 14px;
    }

    .login-form input::placeholder {
      color: #bbb;
    }

    /* Button */
    .login-form button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #00f2ff, #8a2be2);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-form button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00f2ff;
    }

    .new-account {
      margin-top: 12px;
      font-size: 14px;
    }

    .new-account a {
      color: #00f2ff;
      text-decoration: none;
      font-weight: bold;
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="logo.png" alt="EduGenius AI Logo" class="logo">

    <h1>EduGenius AI</h1>
    <p class="tagline">Smart Learning, Smarter Future</p>

    <h2>Login</h2>

    <form class="login-form" onsubmit="loginWithEmail(event)">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <p class="new-account">
      Don't have an account? <a href="signup.html">Create New Account</a>
    </p>

    <footer>© 2026 EduGenius AI</footer>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBCX7uxYy_3XdjZhUpsh5qZ5fTy-Ai3YqQ",
      authDomain: "edugenius-ai69.firebaseapp.com",
      projectId: "edugenius-ai69",
      appId: "1:108519318021:web:f05342a38336895945f26c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function loginWithEmail(event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Please fill all fields");
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          window.location.href = "home.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    }
  </script>

</body>
</html>
